<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Approval Flow - Anchor Positioning</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --pending-color: #f59e0b;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --thread-color: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .request-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .request-header {
            anchor-name: --request-header;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

            .request-header::after {
                display: none;
            }

        .request-id {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .request-status {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--pending-color);
            border: 1px solid var(--pending-color);
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        /* ============================================ */
        /* ANCHOR POSITIONING - THREADED CONNECTIONS */
        /* ============================================ */

        .approval-flow {
            position: relative;
            padding: 1rem 0;
        }

        /* The requester is the first anchor point (like the "comment" in tutorial) */
        .requester {
            anchor-name: --requester;
            position: relative;
            display: inline-block;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .requester-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.25rem;
        }

        .requester-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .requester::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #8b5cf6;
            border-radius: 50%;
            bottom: -5px;
            left: 1rem;
            box-shadow: 0 0 0 4px var(--card-bg);
            z-index: 10;
        }

        .approvals-container {
            position: relative;
            padding-left: 3rem;
            anchor-scope: --approval;
        }

        /* Each approval is an anchor for the next one (like threaded replies) */
        .approval {
            anchor-name: --approval;
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

            /* First approval connects to requester */
            /*.approval:first-child {
                anchor-name: --requester-1;
            }*/

            /* Each subsequent approval gets its own anchor name */
            /*.approval:nth-child(2) {
                anchor-name: --requester-2;
            }

            .approval:nth-child(3) {
                anchor-name: --requester-3;
            }

            .approval:nth-child(4) {
                anchor-name: --requester-4;
            }

            .approval:nth-child(5) {
                anchor-name: --requester-5;
            }*/

            .approval:hover {
                transform: translateX(4px);
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
                border-color: var(--primary-color);
            }

            .approval.approved {
                border-color: var(--success-color);
                background: linear-gradient(135deg, var(--card-bg) 0%, rgba(16, 185, 129, 0.05) 100%);
            }

        .tether {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            /* Anchor positioning stays the same */
            top: anchor(var(--prev-anchor) center);
            left: anchor(var(--prev-anchor) right);
            bottom: anchor(var(--curr-anchor) center);
            right: anchor(var(--curr-anchor) left);
        }

            .tether svg {
                width: 100%;
                height: 100%;
            }

            .tether path {
                stroke: var(--success-color);
                stroke-width: 2;
                fill: none;
                stroke-linecap: round; /* ← ROUNDED ENDPOINTS */
                stroke-linejoin: round; /* ← ROUNDED CORNER */
            }
        .approval[data-order="1"] {
            anchor-name: --approval-1;
        }

        .approval[data-order="2"] {
            anchor-name: --approval-2;
        }

        .approval[data-order="3"] {
            anchor-name: --approval-3;
        }

        .approval[data-order="4"] {
            anchor-name: --approval-4;
        }

        .approval[data-order="5"] {
            anchor-name: --approval-5;
        }

        .approval[data-order="6"] {
            anchor-name: --approval-6;
        }
        .approval.pending {
            border-color: var(--pending-color);
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(245, 158, 11, 0.05) 100%);
        }

        /* First approval connects to requester */
        /*.approval:first-child::after {
                content: '';
                position: absolute;
                border-left: 3px solid var(--thread-color);
                border-bottom: 3px solid var(--thread-color);
                border-bottom-left-radius: 12px;
                top: anchor(--requester bottom);
                left: calc(anchor(--requester left) + 1rem);
                bottom: anchor(--requester-1 center);
                right: anchor(--requester-1 left);
                opacity: 0.9;
                transition: all 0.3s ease;
                z-index: 1;
            }*/

        /* Second approval connects to first approval */
        /*.approval:nth-child(2)::after {
                content: '';
                position: absolute;
                border-left: 3px solid var(--thread-color);
                border-bottom: 3px solid var(--thread-color);
                border-bottom-left-radius: 12px;
                top: anchor(--requester-1 bottom);
                left: calc(anchor(--requester-1 left) + 1rem);
                bottom: anchor(--requester-2 center);
                right: anchor(--requester-2 left);
                opacity: 0.9;
                transition: all 0.3s ease;
                z-index: 1;
            }*/

        /* Third approval connects to second approval */
        /*.approval:nth-child(3)::after {
                content: '';
                position: absolute;
                border-left: 3px solid var(--thread-color);
                border-bottom: 3px solid var(--thread-color);
                border-bottom-left-radius: 12px;
                top: anchor(--requester-2 bottom);
                left: calc(anchor(--requester-2 left) + 1rem);
                bottom: anchor(--requester-3 center);
                right: anchor(--requester-3 left);
                opacity: 0.9;
                transition: all 0.3s ease;
                z-index: 1;
            }*/

        /* Fourth approval connects to third approval */
        /*.approval:nth-child(4)::after {
                content: '';
                position: absolute;
                border-left: 3px solid var(--thread-color);
                border-bottom: 3px solid var(--thread-color);
                border-bottom-left-radius: 12px;
                top: anchor(--requester-3 bottom);
                left: calc(anchor(--requester-3 left) + 1rem);
                bottom: anchor(--requester-4 center);
                right: anchor(--requester-4 left);
                opacity: 0.9;
                transition: all 0.3s ease;
                z-index: 1;
            }*/

        .approval:hover::after {
            opacity: 1;
            border-color: var(--primary-color);
        }

        .approval.approved::after {
            border-color: var(--success-color);
            opacity: 0.8;
        }

        .approval.pending::after {
            border-color: var(--pending-color);
            opacity: 0.7;
        }

        /* Fallback for browsers without anchor positioning support */
        @supports not (anchor-name: --test) {
            .approval::after {
                display: none;
            }

            .approvals-container::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 2px;
                background: var(--thread-color);
            }

            .approval::before {
                content: '';
                position: absolute;
                left: -3rem;
                top: 50%;
                width: 2rem;
                height: 2px;
                background: var(--thread-color);
            }
        }

        /* ============================================ */
        /* END ANCHOR POSITIONING */
        /* ============================================ */

        .approval-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .approval-role {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .approval-order {
            background: var(--bg-color);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .approval-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
        }

            .status-badge.approved {
                background: rgba(16, 185, 129, 0.2);
                color: var(--success-color);
            }

            .status-badge.pending {
                background: rgba(245, 158, 11, 0.2);
                color: var(--pending-color);
            }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Stagger animation */
        .approval {
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

            .approval:nth-child(1) {
                animation-delay: 0.1s;
            }

            .approval:nth-child(2) {
                animation-delay: 0.2s;
            }

            .approval:nth-child(3) {
                animation-delay: 0.3s;
            }

            .approval:nth-child(4) {
                animation-delay: 0.4s;
            }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Connection dots */
        .connection-dot {
            position: absolute;
            margin: 5px;
            width: 10px;
            height: 10px;
            background: var(--primary-color);
            border-radius: 50%;
            left: 0;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 4px var(--card-bg);
            z-index: 10;
        }

        .approval.approved .connection-dot {
            background: var(--success-color);
        }

        .approval.pending .connection-dot {
            background: var(--pending-color);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .browser-support-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--pending-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expense Approval Flow</h1>
        <p class="subtitle">CSS Anchor Positioning - Thread-style connections</p>

        <div class="browser-support-warning" id="browserWarning">
            ⚠️ Your browser doesn't support CSS Anchor Positioning. Using fallback styling.
        </div>

        <div id="approval-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading approval data from SQL Server...</p>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // Check for CSS Anchor Positioning support
            if (!CSS.supports('anchor-name', '--test')) {
                $('#browserWarning').show();
                console.log('CSS Anchor Positioning not supported. Using fallback.');
            }

            // Load approval data from server
            loadApprovalData(9001);
        });

        function loadApprovalData(requestId) {
            $.ajax({
                url: 'GetApprovals.ashx',
                method: 'GET',
                data: { requestId: requestId },
                dataType: 'json',
                success: function (data) {
                    console.log('Data loaded successfully:', data);
                    renderApprovalFlow(data);
                },
                error: function (xhr, status, error) {
                    console.error('Error loading approval data:', error);
                    $('#approval-container').html(`
                                        <div class="error-message">
                                            <strong>Error loading data:</strong> ${error}<br>
                                            <small>Status: ${xhr.status} - ${xhr.statusText}</small>
                                        </div>
                                    `);
                }
            });
        }

        function renderApprovalFlow(data) {
            const container = $('#approval-container');

            // Build the HTML with anchor positioning
            let html = `
                                <div class="request-card">
                                    <div class="request-header">
                                        <div>
                                            <div class="request-id">Request #${data.RequestId}</div>
                                            <div class="detail-value" style="margin-top: 0.5rem; color: var(--text-secondary);">
                                                ${data.RequestDate} • ${data.Amount}
                                            </div>
                                        </div>
                                        <div class="request-status ${data.Status.toLowerCase() === 'pending' ? 'status-pending' : 'status-completed'}">
                                            ${data.Status}
                                        </div>
                                    </div>
                                    <div class="approval-flow">
                                        <!-- The anchor point (like "comment" in tutorial) -->
                                        <div class="requester">
                                            <div class="requester-label">Requester</div>
                                            <div class="requester-name">${data.Requester}</div>
                                        </div>
                                        <div class="approvals-container">
                            `;

            // Sort approvals by order
            data.Approvals.sort((a, b) => a.ApprovalOrder - b.ApprovalOrder);

            // Add each approval (like "reply" in tutorial)
            data.Approvals.forEach((approval, index) => {
                const isApproved = approval.ApprovedOn !== null;
                const statusClass = isApproved ? 'approved' : 'pending';
                const statusText = isApproved ? 'Approved' : 'Pending';

                html += `
                                    <div class="approval ${statusClass}"
                                         data-approval-id="${approval.ApprovalId}"
                                         data-order="${approval.ApprovalOrder}">
                                         ${isApproved ? '<div class="tether"></div>' : ''}
                                        <div class="connection-dot"></div>

                                        <div class="approval-header">
                                            <div class="approval-role">${approval.ApproverRole}</div>
                                            <div class="approval-order">Step ${approval.ApprovalOrder}</div>
                                        </div>
                                        <div class="approval-details">
                                            <div class="detail-item">
                                                <div class="detail-label">Approver</div>
                                                <div class="detail-value">${approval.Approver}</div>
                                            </div>
                                            <div class="detail-item">
                                                <div class="detail-label">Status</div>
                                                <div class="detail-value">
                                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                                </div>
                                            </div>
                                            <div class="detail-item">
                                                <div class="detail-label">Approved On</div>
                                                <div class="detail-value">${isApproved ? formatDate(approval.ApprovedOn) : '—'}</div>
                                            </div>
                                        </div>
                                    </div>
                                `;
            });

            html += `
                                        </div>
                                    </div>
                                </div>
                            `;

            // Animate out loading, then show content
            container.fadeOut(300, function () {
                container.html(html).fadeIn(400, function () {
                    // After DOM is ready, create tethers dynamically
                    createTethers();
                });
            });
        }
        function createTethers() {
            const approvalFlow = $('.approval-flow');

            // Remove existing tethers
            $('.tether').remove();

            // Approved approvals only
            const approvedApprovals = $('.approval.approved');
            if (approvedApprovals.length === 0) return;

            // Get requester element
            const requester = approvalFlow.find('.requester');
            const requesterRect = requester[0].getBoundingClientRect();

            // Requester dot position (CSS: bottom: -5px, left: 1rem, size: 10px)
            const dotRadius = 5; // 10px / 2
            const requesterDotX = requesterRect.left + 16 + dotRadius; // center of dot
            const requesterDotY = requesterRect.bottom - 5 + dotRadius; // center of dot

            // FIXED: The vertical line X position stays constant
            const verticalLineX = requesterDotX;

            // Start Y from bottom of requester dot
            let previousY = requesterDotY + dotRadius;

            approvedApprovals.each(function () {
                const approval = $(this);
                const dot = approval.find('.connection-dot');

                // Get current dot position (10px dot)
                const dotRect = dot[0].getBoundingClientRect();
                const dotCenterX = dotRect.left + (dotRect.width / 2);
                const dotCenterY = dotRect.top + (dotRect.height / 2);

                // Calculate SVG dimensions relative to approval-flow
                const flowOffset = approvalFlow.offset();
                const startX = verticalLineX - flowOffset.left; // Always use the same vertical line X
                const startY = previousY - flowOffset.top;
                const endX = dotCenterX - flowOffset.left;
                const endY = dotCenterY - flowOffset.top;

                const width = endX - startX;
                const height = endY - startY;

                // Border radius for curved corner
                const cornerRadius = 12;

                // Create curved path using quadratic bezier curve
                const pathD = height > cornerRadius
                    ? `M 0 0 L 0 ${height - cornerRadius} Q 0 ${height} ${cornerRadius} ${height} L ${width} ${height}`
                    : `M 0 0 L ${width} ${height}`;

                // Create SVG tether with curved path
                const tether = $(`
            <div class="tether" style="
                position: absolute;
                top: ${startY}px;
                left: ${startX}px;
                width: ${width}px;
                height: ${height}px;
                pointer-events: none;
                z-index: 1;
            ">
                <svg width="100%" height="100%" viewBox="0 0 ${width} ${height}">
                    <path d="${pathD}"
                          stroke="#10b981"
                          stroke-width="2"
                          fill="none"
                          stroke-linecap="round"
                          stroke-linejoin="round" />
                </svg>
            </div>
        `);

                approvalFlow.append(tether);

                // FIXED: Start next tether from center of current dot (continuous line)
                previousY = dotCenterY; // No gap - connect continuously
            });
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
